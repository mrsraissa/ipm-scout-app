<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#065f46">

  <title>IPM Scout</title>
  <link rel="stylesheet" href="css/style.css?v=113">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>


<body>

<div class="layout">
  <aside class="sidebar">
    <h2>IPM Scout</h2>
    <a class="nav-link active" onclick="showPage('scout')">Scout</a>
<a class="nav-link" onclick="showPage('dashboard')">Dashboard</a>
<a class="nav-link" onclick="showPage('heatmaps')">Heat Maps</a>
<a class="nav-link" onclick="showPage('reports')">Reports</a>
  </aside>

  <main class="container">
    <h1> IPM Scout</h1>
    <div id="weekDisplay">Loading week...</div>
    <div id="currentScout"></div>

    

   <div id="scoutPage" class="card">
  <div id="sectionContainer"></div>
  <div id="bayContainer"></div>
  <div id="entryContainer"></div>
</div>
    
<div id="dashboardPage" class="card page hidden-page">
</div>

<div id="heatmapsPage" class="card page hidden-page">
  <h2>Heat Maps</h2>
  <p>Heat maps coming later.</p>
</div>

<div id="reportsPage" class="card page hidden-page">
  <h2>Reports</h2>
  <p>Reports coming later.</p>
</div>
    </div>

   <footer id="bottomBar" class="bottom-bar hidden">
  <button id="bottomSectionsBtn"
        onclick="goToSections()">⌂ Sections</button>

<button id="bottomBaysBtn"
        onclick="goToBays()">◀ Bays</button>
</footer>
  </main>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwdJdfkIzl3ndZZe7go7IB8EONnlMWcPaHKhfXGUoRco1ShtQ6fcmbyJYDH38Ee7ccy/exec";

const pests = ["Thrips", "Aphids", "Whiteflies", "Fungus Gnats"];

const bayMap = {
  "S1":["B1","B2","B3","B4","B5","B6"],
  "S2":["B2","B3","B4","B5","B6","B7","B8","B9","B10","B11","B12","B13","B14","B15","B16"],
  "S3":["B2","B3","B4","B5","B6","B7","B8","B9","B10","B11","B12","B13","B14","B15","B16"],
  "S4":["B1","B2","B3","B4","B5","B6","B7","B8","B9","B10","B11","B12","B13","B14","B15","B16"],
  "S5":["B4","B5","B6","B7","B8","B9","B10"],
  "S6":["B2","B3","B4","B5","B6","B7","B8","B9","B10"],
  "S7":["B2","B3","B4","B5","B6","B7","B8","B9","B10"],
  "S8":["B1","B2","B3","B4","B5","B6","B7","B8","B9"],
  "S9":["B1","B2","B3","B4","B5"],
  "9A":["B6","B7","B8","B9","B10","B11","B12"],
  "9B":["B6","B7","B8","B9","B10","B11","B12"],
  "10A":["B1","B2","B3","B4","B5","B6","B7","B8","B9","B10"],
  "10B":["B1","B2","B3","B4","B5","B6","B7","B8","B9","B10"]
};

const sectionOrder = ["S1","S2","S3","S4","S5","S6","S7","S8","S9","9A","9B","10A","10B"];

let selectedSection = "";
let selectedBay = "";
let weekStatus = {};
let currentWeek = "";
  let currentScout =
  localStorage.getItem("currentScout") || "";

  function loadDashboard() {
  const callbackName = "dashboardCallback_" + Date.now();

  window[callbackName] = function(data) {
    renderDashboard(data);

    delete window[callbackName];
    script.remove();
  };

  const script = document.createElement("script");
  script.src = API_URL + "?action=getDashboard&callback=" + callbackName;
  document.body.appendChild(script);
}
function loadHeatMaps() {
  const callbackName = "heatMapCallback_" + Date.now();

  window[callbackName] = function(data) {
    renderHeatMaps(data);

    delete window[callbackName];
    script.remove();
  };

  const script = document.createElement("script");
  script.src = API_URL + "?action=getHeatMaps&callback=" + callbackName;
  document.body.appendChild(script);
}
function getHeatClass(value, max) {
  if (max === 0) return "heat-low";

  const pct = value / max;

  if (pct >= 0.75) return "heat-very-high";
  if (pct >= 0.50) return "heat-high";
  if (pct >= 0.25) return "heat-mid";

  return "heat-low";
}

function renderHeatMaps(data) {
  if (!data || !data.success) {
    document.getElementById("heatmapsPage").innerHTML =
      "<h2>Heat Maps</h2><p>Could not load heat map data.</p>";
    return;
  }

  const fungusData = data.fungusGnatsBySection || {};
  const thrips = data.thripsHotspots || [];
  const aphids = data.aphidsHotspots || [];

  const sectionNames = Object.keys(fungusData);
  const maxFG = Math.max(
    ...sectionNames.map(section => fungusData[section]["Fungus Gnats"] || 0),
    0
  );

  let html = `
    <button class="download-btn" onclick="downloadHeatMap()">Download PNG</button>

    <div id="heatMapExport">
      <h2>Week ${data.week} Heat Maps</h2>
    <div class="heat-card">
      <div class="heat-title">Fungus Gnats</div>
      <div class="heat-subtitle">Total count by section</div>

      <div class="heat-row">
  `;

  sectionNames.forEach(section => {
    const value = fungusData[section]["Fungus Gnats"] || 0;
    const heatClass = getHeatClass(value, maxFG);

    html += `
      <div class="heat-cell ${heatClass}">
        <strong>${value}</strong>
        <span>${section}</span>
      </div>
    `;
  });

   html += `
      </div>
    </div>
    </div>
  `;

    <div class="heat-card">
      <div class="heat-title">Thrips</div>
      <div class="heat-subtitle">Hot spots by bay — Threshold ≥ 15</div>

      <div class="hotspot-strip">
  `;

  if (thrips.length === 0) {
    html += `<p>No thrips hotspots this week.</p>`;
  }

  thrips.forEach(item => {
    html += `
      <div class="hotspot-block thrips-block">
        <strong>${item.count}</strong>
        <span>${item.label}</span>
      </div>
    `;
  });

  html += `
      </div>
    </div>

    <div class="heat-card">
      <div class="heat-title">Aphids</div>
      <div class="heat-subtitle">Hot spots by bay — Threshold ≥ 5</div>

      <div class="hotspot-strip">
  `;

  if (aphids.length === 0) {
    html += `<p>No aphid hotspots this week.</p>`;
  }

  aphids.forEach(item => {
    html += `
      <div class="hotspot-block aphids-block">
        <strong>${item.count}</strong>
        <span>${item.label}</span>
      </div>
    `;
  });

  html += `
      </div>
    </div>
  `;

  document.getElementById("heatmapsPage").innerHTML = html;
}
function downloadHeatMap() {
  const element = document.getElementById("heatMapExport");

  html2canvas(element, {
    backgroundColor: "#ffffff",
    scale: 2
  }).then(canvas => {
    const link = document.createElement("a");
    link.download = "IPM_Heat_Map.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}




  
function renderDashboard(data) {
  if (!data || !data.success) {
    document.getElementById("dashboardPage").innerHTML =
      "<h2>Dashboard</h2><p>Could not load dashboard data.</p>";
    return;
  }

  const sectionData = data.sectionData;
  const hotspots = data.hotspots;

let html = `
  <h2>Dashboard</h2>

  <div class="dashboard-card">
    <div class="dashboard-title">Week ${data.week}</div>
    <div class="dashboard-percent">${data.progress}% Complete</div>
    <div class="progress-bar">
      <div class="progress-fill" style="width:${data.progress}%"></div>
    </div>
  </div>

  <div class="dashboard-card">
    <h3>Section Completion</h3>
`;

Object.keys(sectionData).forEach(section => {
  html += `
    <div class="section-row">
      <span>${section}</span>
      <div class="small-progress">
        <div class="small-fill" style="width:${sectionData[section].progress}%"></div>
      </div>
      <strong>${sectionData[section].progress}%</strong>
    </div>
  `;
});

html += `
  </div>

  <div class="dashboard-card">
    <h3>Hotspots</h3>
    <div class="hotspot-grid">
`;

Object.keys(hotspots).forEach(pest => {
  const pestClass = {
    "Thrips": "hotspot-thrips",
    "Aphids": "hotspot-aphids",
    "Whiteflies": "hotspot-whiteflies",
    "Fungus Gnats": "hotspot-fungus"
  }[pest];

  html += `
    <div class="hotspot-card ${pestClass}">
      <div class="hotspot-pest">${pest}</div>
      <strong>${hotspots[pest].section}</strong>
      <span>${hotspots[pest].value}</span>
    </div>
  `;
});

html += `
    </div>
  </div>

  <div class="dashboard-card">
   <h3>Sections With Pest Activity</h3>

    <table class="pest-table">
      <tr>
        <th>Sec</th>
        <th>TR</th>
        <th>AP</th>
        <th>WF</th>
        <th>FG</th>
      </tr>
`;

Object.keys(sectionData).forEach(section => {
  const p = sectionData[section].pests;

  const total =
    p["Thrips"] +
    p["Aphids"] +
    p["Whiteflies"] +
    p["Fungus Gnats"];

  if (total === 0) return;

  html += `
    <tr>
      <td>${section}</td>
      <td>${p["Thrips"]}</td>
      <td>${p["Aphids"]}</td>
      <td>${p["Whiteflies"]}</td>
      <td>${p["Fungus Gnats"]}</td>
    </tr>
  `;
});

html += `
      </table>

      <div class="pest-legend">
        TR = Thrips | AP = Aphids | WF = Whiteflies | FG = Fungus Gnats
      </div>
    </div>
`;

document.getElementById("dashboardPage").innerHTML = html;
}
  
  
function showPage(page) {
  document.getElementById("scoutPage").style.display = "none";
  document.getElementById("dashboardPage").style.display = "none";
  document.getElementById("heatmapsPage").style.display = "none";
  document.getElementById("reportsPage").style.display = "none";

  document.querySelectorAll(".nav-link").forEach(link => {
    link.classList.remove("active");
  });

  if (page === "scout") {
    document.getElementById("scoutPage").style.display = "block";
    document.querySelectorAll(".nav-link")[0].classList.add("active");
    renderSections();
  }

if (page === "dashboard") {
  document.getElementById("dashboardPage").style.display = "block";
  document.querySelectorAll(".nav-link")[1].classList.add("active");
  updateBottomBar("sections");
  showScoutNameOnly();
  loadDashboard();
}

if (page === "heatmaps") {
  document.getElementById("heatmapsPage").style.display = "block";
  document.querySelectorAll(".nav-link")[2].classList.add("active");
  updateBottomBar("sections");
  showScoutNameOnly();
  loadHeatMaps();
}

if (page === "reports") {
  document.getElementById("reportsPage").style.display = "block";
  document.querySelectorAll(".nav-link")[3].classList.add("active");
  updateBottomBar("sections");
  showScoutNameOnly();
}
}

loadStatus();

function loadStatus() {
  const callbackName = "statusCallback_" + Date.now();

  window[callbackName] = function(data) {
    if (data.success) {
      weekStatus = data.records || {};
      currentWeek = data.week || "";

      document.getElementById("weekDisplay").innerHTML =
        currentWeek ? "Week " + currentWeek : "";

      if (currentScout) {
       document.getElementById("currentScout").innerHTML =
  `Scout: ${currentScout} <span class="edit-scout-btn" onclick="changeScout()">✎</span>`;

        renderSections();
      } else {
        selectScout();
      }
    }

    delete window[callbackName];
    script.remove();
  };

  const script = document.createElement("script");
  script.src = API_URL + "?action=getStatus&callback=" + callbackName;
  document.body.appendChild(script);
}
function updateBottomBar(screen) {
  const bar = document.getElementById("bottomBar");
  const sectionsBtn = document.getElementById("bottomSectionsBtn");
  const baysBtn = document.getElementById("bottomBaysBtn");

  if (screen === "sections") {
    bar.classList.add("hidden");
    return;
  }

  bar.classList.remove("hidden");

  sectionsBtn.style.display = screen === "bays" ? "block" : "none";
  baysBtn.style.display = screen === "entry" ? "block" : "none";
}
function selectScout() {

  let html = `
    <h2>Scout Name</h2>

    <input
      id="scoutNameInput"
      class="scout-input"
      type="text"
      placeholder="Enter your name"
    >

    <button class="save-btn" onclick="saveScoutName()">
      Continue
    </button>
  `;

  document.getElementById("sectionContainer").innerHTML = html;
}
function saveScoutName() {
  const name = document.getElementById("scoutNameInput").value.trim();

  if (!name) {
    alert("Please enter your name.");
    return;
  }

  currentScout = name;
  localStorage.setItem("currentScout", name);

  document.getElementById("currentScout").innerHTML =
    "Scout: " + name;

  renderSections();
}
 function showScoutWithPencil() {
  document.getElementById("currentScout").innerHTML =
    `Scout: ${currentScout}&nbsp;<span class="edit-scout-btn" onclick="changeScout()">✎</span>`;
}

function showScoutNameOnly() {
  document.getElementById("currentScout").innerHTML =
    `Scout: ${currentScout}`;
} 
function renderSections() {
  selectedSection = "";
  selectedBay = "";
updateBottomBar("sections");
  showScoutWithPencil();
  document.getElementById("currentScout").style.display = "block";

  document.getElementById("bayContainer").innerHTML = "";
  document.getElementById("entryContainer").innerHTML = "";

  let html = `<h2>Select Section</h2><div class="grid section-grid">`;

  sectionOrder.forEach(section => {
    html += `
      <button class="btn" onclick="showBays('${section}')">
        ${section}
      </button>
    `;
  });

  html += `</div>`;
  document.getElementById("sectionContainer").innerHTML = html;
}

function showBays(section) {
  const progress = getSectionPercent(section);
  selectedSection = section;
  selectedBay = "";

  updateBottomBar("bays");
  showScoutNameOnly();
  document.getElementById("currentScout").style.display = "block";

  document.getElementById("sectionContainer").innerHTML = "";
  document.getElementById("entryContainer").innerHTML = "";

  let html = `
        <h2>${section} - Select Bay</h2>
    <div class="section-percent">Progress: ${progress}%</div>
    <div class="grid bay-grid">
  `;

  bayMap[section].forEach(bay => {
    const statusClass = getBayStatus(section, bay);
    html += `<button class="btn ${statusClass}" onclick="handleBayClick('${bay}')">${bay}</button>`;
  });

  html += `</div>`;
  document.getElementById("bayContainer").innerHTML = html;
}

function getSectionPercent(section) {
  const total = bayMap[section].length;
  let completed = 0;

  bayMap[section].forEach(bay => {
    const key = section + "|" + bay;

    if (weekStatus[key] === "Scouted" || weekStatus[key] === "Empty") {
      completed++;
    }
  });

  return Math.round((completed / total) * 100);
}

function getBayStatus(section, bay) {
  const key = section + "|" + bay;
  const status = weekStatus[key];

  if (status === "Scouted") return "scouted";
  if (status === "Empty") return "empty";

  return "not-scouted";
}
function getEntryData(section, bay) {
  return new Promise((resolve) => {
    const callbackName = "entryCallback_" + Date.now();

    window[callbackName] = function(data) {
      resolve(data);

      delete window[callbackName];
      script.remove();
    };

    const script = document.createElement("script");
    script.src =
      API_URL +
      "?action=getEntry" +
      "&section=" + encodeURIComponent(section) +
      "&bay=" + encodeURIComponent(bay) +
      "&callback=" + callbackName;

    document.body.appendChild(script);
  });
}


 
async function handleBayClick(bay) {
  const key = selectedSection + "|" + bay;
  const status = weekStatus[key];

  if (status === "Scouted" || status === "Empty") {
    const answer = confirm(
      "This bay was already entered this week.\n\nDo you want to modify it?"
    );

    if (!answer) {
      return;
    }

    const entryData = await getEntryData(selectedSection, bay);
    showEntry(bay, entryData);
    return;
  }

  showEntry(bay);
}
function showEntry(bay, entryData = null) {
  selectedBay = bay;

  updateBottomBar("entry");
  showScoutNameOnly();
  
  document.getElementById("currentScout").style.display = "block";

  document.getElementById("bayContainer").innerHTML = "";

  let html = `
    <h2>${selectedSection} - ${selectedBay}</h2>
  `;

  pests.forEach(pest => {
    const savedValue =
      entryData && entryData.counts[pest] !== ""
        ? entryData.counts[pest]
        : "";

    html += `
      <div class="entry-row">
        <label>${pest}</label>
        <input type="number" min="0" placeholder="0" value="${savedValue}" data-pest="${pest}">
      </div>
    `;
  });

  const savedNotes = entryData ? entryData.notes || "" : "";
  const lastUpdated = entryData && entryData.lastUpdated
    ? new Date(entryData.lastUpdated).toLocaleString()
    : "";
  const lastScout = entryData && entryData.lastScout
  ? entryData.lastScout
  : "";

  html += `
    <label><strong>Notes</strong></label>
    <textarea id="notes" placeholder="Crop, location, treatment, beneficials...">${savedNotes}</textarea>

    <button class="save-btn" onclick="saveCounts()">Save Counts</button>
    <button class="empty-btn" onclick="saveEmptyBay()">No Plants</button>

    ${lastUpdated ? `<div class="last-updated">Last updated: ${lastScout ? lastScout + " - " : ""}${lastUpdated}</div>` : ""}

    <div id="message" class="message"></div>
  `;

  document.getElementById("entryContainer").innerHTML = html;
}

function sendToSheet(params) {
  const formData = new URLSearchParams();

  Object.keys(params).forEach(key => {
    formData.append(key, params[key]);
  });

  return fetch(API_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: formData.toString()
  });
}

async function saveCounts() {
  const values = {};

  document.querySelectorAll("#entryContainer input").forEach(input => {
    values[input.dataset.pest] = input.value;
  });

  document.getElementById("message").innerHTML = "Saving...";
  document.getElementById("message").className = "message";

  try {
    await sendToSheet({
      scout: currentScout,
      section: selectedSection,
      bay: selectedBay,
      status: "Scouted",
      thrips: values["Thrips"] || 0,
      aphids: values["Aphids"] || 0,
      whiteflies: values["Whiteflies"] || 0,
      fungusGnats: values["Fungus Gnats"] || 0,
      notes: document.getElementById("notes").value
    });

    weekStatus[selectedSection + "|" + selectedBay] = "Scouted";

    document.getElementById("message").innerHTML = "✓ Saved Successfully";
    document.getElementById("message").className = "message success-message";

    setTimeout(() => showBays(selectedSection), 900);

  } catch (err) {
    document.getElementById("message").innerHTML =
      "Save failed. Check internet connection.";
    document.getElementById("message").className = "message error-message";
  }
}

async function saveEmptyBay() {
  document.getElementById("message").innerHTML = "Saving...";
  document.getElementById("message").className = "message";

  try {
    await sendToSheet({
      scout: currentScout,
      section: selectedSection,
      bay: selectedBay,
      status: "Empty",
      notes: document.getElementById("notes").value || "No plants"
    });

    weekStatus[selectedSection + "|" + selectedBay] = "Empty";

    document.getElementById("message").innerHTML = "✓ Empty Bay Saved";
    document.getElementById("message").className = "message success-message";

    setTimeout(() => showBays(selectedSection), 900);

  } catch (err) {
    document.getElementById("message").innerHTML =
      "Save failed. Check internet connection.";
    document.getElementById("message").className = "message error-message";
  }
}
function goToSections() {
  renderSections();
}

function goToBays() {
  if (selectedSection) {
    showBays(selectedSection);
  }
}
  function changeScout() {
  localStorage.removeItem("currentScout");
  currentScout = "";
  document.getElementById("currentScout").innerHTML = "";
  selectScout();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<body>
  <button onclick="sendTest()">Send POST Test</button>

  <script>
    function sendTest() {
      const scriptURL = "https://script.google.com/macros/s/AKfycbwdJdfkIzl3ndZZe7go7IB8EONnlMWcPaHKhfXGUoRco1ShtQ6fcmbyJYDH38Ee7ccy/exec";

      const formData = new URLSearchParams();
      formData.append("scout", "Raissa");
      formData.append("section", "S1");
      formData.append("bay", "B1");
      formData.append("status", "Scouted");
      formData.append("thrips", "99");
      formData.append("aphids", "1");
      formData.append("whiteflies", "0");
      formData.append("fungusGnats", "2");
      formData.append("notes", "POST TEST PAGE");

      fetch(scriptURL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: formData.toString()
      });

      alert("POST sent");
    }
  </script>
</body>
</html>

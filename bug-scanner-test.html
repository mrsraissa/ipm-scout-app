<!DOCTYPE html>
<html>
<head>
  <title>Bug Scanner Test V4</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#f3f4f6; }
    .card { background:white; padding:20px; border-radius:14px; max-width:1100px; margin:auto; }
    canvas { max-width:100%; border:1px solid #ccc; margin-top:15px; }
    .result { font-size:24px; font-weight:bold; color:#065f46; margin-top:15px; }
  </style>
</head>
<body>

<div class="card">
  <h2>Bug Scanner Test V4 - Grid Removed</h2>
  <input type="file" accept="image/*" id="photoInput">
  <div class="result" id="result">Upload a sticky card photo.</div>
  <canvas id="canvas"></canvas>
</div>

<script>
document.getElementById("photoInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const img = new Image();

  img.onload = function() {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const maxWidth = 1000;
    const scale = Math.min(maxWidth / img.width, 1);

    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);

    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    const w = canvas.width;
    const h = canvas.height;

    const mask = new Uint8Array(w * h);

    const ignoreTop = Math.round(h * 0.12);
    const gridThickness = 8;

    const verticalLines = [
      Math.round(w * 0.27),
      Math.round(w * 0.53),
      Math.round(w * 0.79)
    ];

    const horizontalLines = [
      Math.round(h * 0.28),
      Math.round(h * 0.50),
      Math.round(h * 0.72),
      Math.round(h * 0.94)
    ];

    for (let y = ignoreTop; y < h; y++) {
      for (let x = 0; x < w; x++) {

        let onGrid = false;

        for (const gx of verticalLines) {
          if (Math.abs(x - gx) < gridThickness) onGrid = true;
        }

        for (const gy of horizontalLines) {
          if (Math.abs(y - gy) < gridThickness) onGrid = true;
        }

        // if (onGrid) continue;

        const idx = (y * w + x) * 4;
const r = data[idx];
const g = data[idx + 1];
const b = data[idx + 2];

const brightness = (r + g + b) / 3;
const maxRGB = Math.max(r, g, b);
const minRGB = Math.min(r, g, b);

// Remove gray grid lines
const isGridPixel =
  brightness > 40 &&
  brightness < 130 &&
  (maxRGB - minRGB) < 25;

if (isGridPixel) {
  continue;
}

// Detect dark insects
if (
  brightness < 95 &&
  !(r > 120 && g > 120 && b > 120)
) {
  mask[y * w + x] = 1;
}
      }
    }

    const visited = new Uint8Array(w * h);
    const components = [];

    function floodFill(startX, startY) {
      const stack = [[startX, startY]];
      let count = 0;
      let minX = startX, maxX = startX;
      let minY = startY, maxY = startY;

      visited[startY * w + startX] = 1;

      while (stack.length) {
        const [x, y] = stack.pop();
        count++;

        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;

        const neighbors = [
          [x + 1, y], [x - 1, y],
          [x, y + 1], [x, y - 1]
        ];

        for (const [nx, ny] of neighbors) {
          if (nx < 0 || nx >= w || ny < ignoreTop || ny >= h) continue;

          const pos = ny * w + nx;

          if (mask[pos] === 1 && visited[pos] === 0) {
            visited[pos] = 1;
            stack.push([nx, ny]);
          }
        }
      }

      return { count, minX, maxX, minY, maxY };
    }

    for (let y = ignoreTop; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const pos = y * w + x;

        if (mask[pos] === 1 && visited[pos] === 0) {
          const comp = floodFill(x, y);

          const boxW = comp.maxX - comp.minX + 1;
          const boxH = comp.maxY - comp.minY + 1;
          const aspectRatio = Math.max(boxW, boxH) / Math.max(1, Math.min(boxW, boxH));

          if (aspectRatio > 4) continue;
          const area = boxW * boxH;

if (area < 80) continue;

          if (
            (boxW > 25 && boxH < 8) ||
            (boxH > 25 && boxW < 8)
          ) {
            continue;
          }

          if (
            comp.count >= 80 &&
            comp.count <= 800 &&
            boxW >= 8 &&
            boxH >= 8 &&
            boxW <= 60 &&
            boxH <= 60
          ) {
            components.push(comp);
          }
        }
      }
    }

    ctx.lineWidth = 2;
    ctx.strokeStyle = "red";

    components.forEach(c => {
      ctx.strokeRect(
        c.minX,
        c.minY,
        c.maxX - c.minX + 1,
        c.maxY - c.minY + 1
      );
    });

    document.getElementById("result").innerText =
      "Detected insect-like objects: " + components.length;
  };

  img.src = URL.createObjectURL(file);
});
</script>

</body>
</html>

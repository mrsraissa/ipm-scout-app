<!DOCTYPE html>
<html>
<head>
  <title>Bug Scanner Test V9</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#f3f4f6; }
    .card { background:white; padding:20px; border-radius:14px; max-width:1200px; margin:auto; }
    canvas { max-width:100%; border:1px solid #ccc; margin-top:15px; }
    .result { font-size:24px; font-weight:bold; color:#065f46; margin-top:15px; }
  </style>
</head>
<body>

<div class="card">
  <h2>Bug Scanner Test V9 - Paint Grid First</h2>
  <input type="file" accept="image/*" id="photoInput">
  <div class="result" id="result">Upload a sticky card photo.</div>
  <canvas id="canvas"></canvas>
</div>

<script>
document.getElementById("photoInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const img = new Image();

  img.onload = function() {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const maxWidth = 1000;
    const scale = Math.min(maxWidth / img.width, 1);

    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);

    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    const w = canvas.width;
    const h = canvas.height;

    const ignoreTop = Math.round(h * 0.08);

    // STEP 1: detect all dark objects
    const firstMask = makeDarkMask(data, w, h, ignoreTop, 115);
    const firstObjects = findObjects(firstMask, w, h, ignoreTop);

    // STEP 2: detect grid lines by repeated rows/columns
    const gridInfo = detectGridLines(firstObjects);

    // STEP 3: paint detected grid lines yellow
    const cleanedData = new Uint8ClampedArray(data);
    paintGridYellow(cleanedData, w, h, gridInfo.gridXLines, gridInfo.gridYLines);

    // STEP 4: run detection again on cleaned image
    const secondMask = makeDarkMask(cleanedData, w, h, ignoreTop, 100);
    const secondObjects = findObjects(secondMask, w, h, ignoreTop);

    const finalObjects = secondObjects.filter(o => {
      const validSize =
        o.pixels >= 40 &&
        o.pixels <= 3000 &&
        o.area >= 50 &&
        o.boxW >= 3 &&
        o.boxH >= 3 &&
        o.boxW <= 160 &&
        o.boxH <= 160;

      const notEdge =
        o.minX > 5 &&
        o.maxX < w - 5 &&
        o.minY > ignoreTop + 10 &&
        o.maxY < h - 5;

      return validSize && notEdge;
    });

    const outputImage = new ImageData(cleanedData, w, h);
    ctx.putImageData(outputImage, 0, 0);

    ctx.lineWidth = 2;
    ctx.font = "12px Arial";

    finalObjects.forEach((o, index) => {
      ctx.strokeStyle = "red";
      ctx.fillStyle = "red";
      ctx.strokeRect(o.minX, o.minY, o.boxW, o.boxH);
      ctx.fillText(index + 1, o.minX, o.minY - 2);
    });

    document.getElementById("result").innerText =
      "Detected insect-like objects: " + finalObjects.length +
      " | Grid rows painted: " + gridInfo.gridYLines.length +
      " | Grid columns painted: " + gridInfo.gridXLines.length;
  };

  img.src = URL.createObjectURL(file);
});

function makeDarkMask(data, w, h, ignoreTop, threshold) {
  const mask = new Uint8Array(w * h);

  for (let y = ignoreTop; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const idx = (y * w + x) * 4;
      const r = data[idx];
      const g = data[idx + 1];
      const b = data[idx + 2];

      const brightness = (r + g + b) / 3;

      if (brightness < threshold) {
        mask[y * w + x] = 1;
      }
    }
  }

  return mask;
}

function findObjects(mask, w, h, ignoreTop) {
  const visited = new Uint8Array(w * h);
  const objects = [];

  function floodFill(startX, startY) {
    const stack = [[startX, startY]];
    let pixels = 0;
    let minX = startX, maxX = startX;
    let minY = startY, maxY = startY;

    visited[startY * w + startX] = 1;

    while (stack.length) {
      const [x, y] = stack.pop();
      pixels++;

      minX = Math.min(minX, x);
      maxX = Math.max(maxX, x);
      minY = Math.min(minY, y);
      maxY = Math.max(maxY, y);

      const neighbors = [
        [x + 1, y], [x - 1, y],
        [x, y + 1], [x, y - 1]
      ];

      for (const [nx, ny] of neighbors) {
        if (nx < 0 || nx >= w || ny < ignoreTop || ny >= h) continue;

        const pos = ny * w + nx;

        if (mask[pos] === 1 && visited[pos] === 0) {
          visited[pos] = 1;
          stack.push([nx, ny]);
        }
      }
    }

    return { pixels, minX, maxX, minY, maxY };
  }

  for (let y = ignoreTop; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const pos = y * w + x;

      if (mask[pos] === 1 && visited[pos] === 0) {
        const obj = floodFill(x, y);

        const boxW = obj.maxX - obj.minX + 1;
        const boxH = obj.maxY - obj.minY + 1;
        const area = boxW * boxH;
        const aspectRatio = Math.max(boxW, boxH) / Math.max(1, Math.min(boxW, boxH));
        const fillRatio = obj.pixels / area;
        const centerX = (obj.minX + obj.maxX) / 2;
        const centerY = (obj.minY + obj.maxY) / 2;

        if (
          obj.pixels >= 5 &&
          boxW >= 2 &&
          boxH >= 2 &&
          boxW <= 200 &&
          boxH <= 200
        ) {
          objects.push({
            pixels: obj.pixels,
            boxW,
            boxH,
            area,
            aspectRatio,
            fillRatio,
            centerX,
            centerY,
            minX: obj.minX,
            minY: obj.minY,
            maxX: obj.maxX,
            maxY: obj.maxY
          });
        }
      }
    }
  }

  return objects;
}

function detectGridLines(objects) {
  const xTolerance = 8;
  const yTolerance = 8;
  const minObjectsOnLine = 8;

  const xLines = [];
  const yLines = [];

  objects.forEach(o => {
    let xCount = 0;
    let yCount = 0;

    objects.forEach(other => {
      if (Math.abs(o.centerX - other.centerX) <= xTolerance) xCount++;
      if (Math.abs(o.centerY - other.centerY) <= yTolerance) yCount++;
    });

    if (xCount >= minObjectsOnLine) xLines.push(o.centerX);
    if (yCount >= minObjectsOnLine) yLines.push(o.centerY);
  });

  return {
    gridXLines: mergeLines(xLines, 15),
    gridYLines: mergeLines(yLines, 15)
  };
}

function mergeLines(lines, tolerance) {
  const sorted = [...lines].sort((a,b) => a - b);
  const merged = [];

  sorted.forEach(value => {
    if (merged.length === 0) {
      merged.push({ sum:value, count:1, value:value });
    } else {
      const last = merged[merged.length - 1];
      if (Math.abs(value - last.value) <= tolerance) {
        last.sum += value;
        last.count++;
        last.value = last.sum / last.count;
      } else {
        merged.push({ sum:value, count:1, value:value });
      }
    }
  });

  return merged.map(m => m.value);
}

function paintGridYellow(data, w, h, gridXLines, gridYLines) {
  const thickness = 14;

  function paintPixel(x, y) {
    if (x < 0 || x >= w || y < 0 || y >= h) return;
    const idx = (y * w + x) * 4;

    data[idx] = 230;
    data[idx + 1] = 210;
    data[idx + 2] = 20;
  }

  for (const gx of gridXLines) {
    for (let y = 0; y < h; y++) {
      for (let dx = -thickness; dx <= thickness; dx++) {
        paintPixel(Math.round(gx + dx), y);
      }
    }
  }

  for (const gy of gridYLines) {
    for (let x = 0; x < w; x++) {
      for (let dy = -thickness; dy <= thickness; dy++) {
        paintPixel(x, Math.round(gy + dy));
      }
    }
  }
}
</script>

</body>
</html>

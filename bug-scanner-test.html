<!DOCTYPE html>
<html>
<head>
  <title>Bug Scanner Test V5</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#f3f4f6; }
    .card { background:white; padding:20px; border-radius:14px; max-width:1100px; margin:auto; }
    canvas { max-width:100%; border:1px solid #ccc; margin-top:15px; }
    .result { font-size:24px; font-weight:bold; color:#065f46; margin-top:15px; }
    label { font-weight:bold; display:block; margin-top:12px; }
  </style>
</head>
<body>

<div class="card">
  <h2>Bug Scanner Test V5 - Background Comparison</h2>

  <label>1. Upload blank/reference card</label>
  <input type="file" accept="image/*" id="blankInput">

  <label>2. Upload scout card with insects</label>
  <input type="file" accept="image/*" id="bugInput">

  <div class="result" id="result">Upload both images.</div>
  <canvas id="canvas"></canvas>
</div>

<script>
let blankImg = null;
let bugImg = null;

document.getElementById("blankInput").addEventListener("change", e => {
  loadImage(e.target.files[0], img => {
    blankImg = img;
    runScanner();
  });
});

document.getElementById("bugInput").addEventListener("change", e => {
  loadImage(e.target.files[0], img => {
    bugImg = img;
    runScanner();
  });
});

function loadImage(file, callback) {
  if (!file) return;
  const img = new Image();
  img.onload = () => callback(img);
  img.src = URL.createObjectURL(file);
}

function runScanner() {
  if (!blankImg || !bugImg) return;

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const w = 900;
  const h = Math.round(w * bugImg.height / bugImg.width);

  canvas.width = w;
  canvas.height = h;

  const blankCanvas = document.createElement("canvas");
  const bugCanvas = document.createElement("canvas");

  blankCanvas.width = w;
  blankCanvas.height = h;
  bugCanvas.width = w;
  bugCanvas.height = h;

  const blankCtx = blankCanvas.getContext("2d");
  const bugCtx = bugCanvas.getContext("2d");

  blankCtx.drawImage(blankImg, 0, 0, w, h);
  bugCtx.drawImage(bugImg, 0, 0, w, h);

  const blankData = blankCtx.getImageData(0, 0, w, h);
  const bugData = bugCtx.getImageData(0, 0, w, h);

  const mask = new Uint8Array(w * h);

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;

      const br = blankData.data[i];
      const bg = blankData.data[i + 1];
      const bb = blankData.data[i + 2];

      const r = bugData.data[i];
      const g = bugData.data[i + 1];
      const b = bugData.data[i + 2];

      const blankBrightness = (br + bg + bb) / 3;
      const bugBrightness = (r + g + b) / 3;

      const difference =
        Math.abs(r - br) +
        Math.abs(g - bg) +
        Math.abs(b - bb);

      // New dark object compared with blank card
      if (
        difference > 70 &&
        bugBrightness < blankBrightness - 20 &&
        bugBrightness < 150
      ) {
        mask[y * w + x] = 1;
      }
    }
  }

  const visited = new Uint8Array(w * h);
  const components = [];

  function floodFill(startX, startY) {
    const stack = [[startX, startY]];
    let count = 0;
    let minX = startX, maxX = startX;
    let minY = startY, maxY = startY;

    visited[startY * w + startX] = 1;

    while (stack.length) {
      const [x, y] = stack.pop();
      count++;

      minX = Math.min(minX, x);
      maxX = Math.max(maxX, x);
      minY = Math.min(minY, y);
      maxY = Math.max(maxY, y);

      const neighbors = [
        [x + 1, y], [x - 1, y],
        [x, y + 1], [x, y - 1]
      ];

      for (const [nx, ny] of neighbors) {
        if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;

        const pos = ny * w + nx;

        if (mask[pos] === 1 && visited[pos] === 0) {
          visited[pos] = 1;
          stack.push([nx, ny]);
        }
      }
    }

    return { count, minX, maxX, minY, maxY };
  }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const pos = y * w + x;

      if (mask[pos] === 1 && visited[pos] === 0) {
        const comp = floodFill(x, y);

        const boxW = comp.maxX - comp.minX + 1;
        const boxH = comp.maxY - comp.minY + 1;
        const area = boxW * boxH;
        const aspectRatio = Math.max(boxW, boxH) / Math.max(1, Math.min(boxW, boxH));

        if (
          comp.count >= 20 &&
          comp.count <= 1200 &&
          area >= 40 &&
          boxW >= 3 &&
          boxH >= 3 &&
          boxW <= 80 &&
          boxH <= 80 &&
          aspectRatio <= 6
        ) {
          components.push(comp);
        }
      }
    }
  }

  ctx.drawImage(bugImg, 0, 0, w, h);

  ctx.lineWidth = 2;
  ctx.strokeStyle = "red";

  components.forEach(c => {
    ctx.strokeRect(
      c.minX,
      c.minY,
      c.maxX - c.minX + 1,
      c.maxY - c.minY + 1
    );
  });

  document.getElementById("result").innerText =
    "Detected insect-like objects: " + components.length;
}
</script>

</body>
</html>
